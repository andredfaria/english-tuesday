# Render Blueprint — deploya o servidor socket.io (pasta server/).
# No painel do Render: New + → Blueprint → selecione este repo → Apply.
services:
  - type: web
    name: english-tuesday-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      # Origem do front (Netlify) liberada no CORS do servidor.
      - key: ALLOWED_ORIGINS
        value: https://english-tuesday.netlify.app
      - key: NODE_VERSION
        value: "20"
